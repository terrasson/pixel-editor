<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Gradients pour effet 3D -->
    <linearGradient id="blue3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0056B3;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="red3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF3B30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D70015;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="green3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CD964;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#34C759;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#248A3D;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="yellow3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD60A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFCC02;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F2A900;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="purple3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BF5AF2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#AF52DE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="orange3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F0A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Arrière-plan dégradé -->
  <rect width="32" height="32" fill="url(#blue3d)" rx="6" ry="6"/>
  
  <!-- Grille en perspective (fond) -->
  <g transform="rotate(-15 16 16)" opacity="0.2">
    <rect x="4" y="4" width="24" height="24" fill="none" stroke="white" stroke-width="0.5"/>
    <line x1="10" y1="4" x2="10" y2="28" stroke="white" stroke-width="0.3"/>
    <line x1="16" y1="4" x2="16" y2="28" stroke="white" stroke-width="0.3"/>
    <line x1="22" y1="4" x2="22" y2="28" stroke="white" stroke-width="0.3"/>
    <line x1="4" y1="10" x2="28" y2="10" stroke="white" stroke-width="0.3"/>
    <line x1="4" y1="16" x2="28" y2="16" stroke="white" stroke-width="0.3"/>
    <line x1="4" y1="22" x2="28" y2="22" stroke="white" stroke-width="0.3"/>
  </g>
  
  <!-- Pixels 3D qui "sortent" de l'icône -->
  <!-- Pixel bleu principal (en avant) -->
  <g transform="translate(2, 2)">
    <rect x="0" y="0" width="6" height="6" fill="url(#blue3d)" rx="1"/>
    <rect x="0.5" y="0.5" width="5" height="5" fill="rgba(255,255,255,0.3)" rx="0.5"/>
    <rect x="1" y="1" width="1" height="1" fill="rgba(255,255,255,0.8)"/>
  </g>
  
  <!-- Pixel rouge (décalé) -->
  <g transform="translate(12, 1) rotate(15)">
    <rect x="0" y="0" width="5" height="5" fill="url(#red3d)" rx="1"/>
    <rect x="0.5" y="0.5" width="4" height="4" fill="rgba(255,255,255,0.3)" rx="0.5"/>
    <rect x="1" y="1" width="1" height="1" fill="rgba(255,255,255,0.8)"/>
  </g>
  
  <!-- Pixel vert -->
  <g transform="translate(24, 6) rotate(-10)">
    <rect x="0" y="0" width="5" height="5" fill="url(#green3d)" rx="1"/>
    <rect x="0.5" y="0.5" width="4" height="4" fill="rgba(255,255,255,0.3)" rx="0.5"/>
    <rect x="1" y="1" width="1" height="1" fill="rgba(255,255,255,0.8)"/>
  </g>
  
  <!-- Pixel jaune -->
  <g transform="translate(1, 12) rotate(20)">
    <rect x="0" y="0" width="4" height="4" fill="url(#yellow3d)" rx="1"/>
    <rect x="0.5" y="0.5" width="3" height="3" fill="rgba(255,255,255,0.3)" rx="0.5"/>
    <rect x="1" y="1" width="1" height="1" fill="rgba(255,255,255,0.8)"/>
  </g>
  
  <!-- Pixel violet -->
  <g transform="translate(20, 18) rotate(-25)">
    <rect x="0" y="0" width="4" height="4" fill="url(#purple3d)" rx="1"/>
    <rect x="0.5" y="0.5" width="3" height="3" fill="rgba(255,255,255,0.3)" rx="0.5"/>
    <rect x="1" y="1" width="1" height="1" fill="rgba(255,255,255,0.8)"/>
  </g>
  
  <!-- Pixel orange (le plus en avant) -->
  <g transform="translate(8, 24) rotate(12)">
    <rect x="0" y="0" width="6" height="6" fill="url(#orange3d)" rx="1"/>
    <rect x="0.5" y="0.5" width="5" height="5" fill="rgba(255,255,255,0.3)" rx="0.5"/>
    <rect x="1" y="1" width="1" height="1" fill="rgba(255,255,255,0.8)"/>
  </g>
  
  <!-- Particules brillantes pour effet dynamique -->
  <circle cx="6" cy="8" r="0.5" fill="rgba(255,255,255,0.9)"/>
  <circle cx="26" cy="12" r="0.3" fill="rgba(255,255,255,0.7)"/>
  <circle cx="18" cy="26" r="0.4" fill="rgba(255,255,255,0.8)"/>
  <circle cx="14" cy="6" r="0.2" fill="rgba(255,255,255,0.6)"/>
</svg> 