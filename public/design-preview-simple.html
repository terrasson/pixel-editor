<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Design Simple - Pixel Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FFFFFF;
            height: 100vh;
            overflow: hidden;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 240px 1fr 220px;
            grid-template-rows: auto 1fr;
            height: 100vh;
        }

        /* HEADER - Bandeau horizontal */
        .header {
            grid-column: 1 / -1;
            background: #FFFFFF;
            border-bottom: 1px solid #E5E5EA;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .branding {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-placeholder {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #FF7300, #FF8E53);
            border-radius: 8px;
        }

        .text-placeholder {
            height: 50px;
            width: 150px;
            background: linear-gradient(135deg, #1D1D1F, #3A3A3C);
            border-radius: 8px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
        }

        .play-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: #FF7300;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        /* SIDEBAR GAUCHE - Séparée par un trait vertical */
        .sidebar-left {
            background: #FAFAFA;
            border-right: 1px solid #E5E5EA;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-left h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1D1D1F;
            margin-bottom: 16px;
        }

        /* CANVAS CENTRAL - Séparé par des traits verticaux */
        .canvas-area {
            background: #FFFFFF;
            padding: 20px;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .canvas-grid {
            width: 512px;
            height: 512px;
            background: 
                linear-gradient(to right, #E5E5EA 1px, transparent 1px),
                linear-gradient(to bottom, #E5E5EA 1px, transparent 1px);
            background-size: 16px 16px;
            background-color: white;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
        }

        /* SIDEBAR DROITE - Séparée par un trait vertical */
        .sidebar-right {
            background: #FAFAFA;
            border-left: 1px solid #E5E5EA;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-right h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1D1D1F;
            margin-bottom: 16px;
        }

        /* BOUTONS SIMPLES */
        .btn {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 8px;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            background: #FFFFFF;
            color: #1D1D1F;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s ease;
        }

        .btn:hover {
            background: #F5F5F7;
        }

        .btn-special {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            border: none;
        }

        .btn-special:hover {
            background: linear-gradient(135deg, #FF5A5A, #FF7D42);
        }

        .btn-success {
            background: linear-gradient(135deg, #4CAF50, #45A049);
            color: white;
            border: none;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #45A049, #3D8B40);
        }

        /* PALETTE DE COULEURS */
        .color-palette {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .color-swatch {
            aspect-ratio: 1;
            border-radius: 6px;
            border: 1px solid #E5E5EA;
            cursor: pointer;
        }

        /* FRAMES */
        .add-frame-btn {
            width: 100%;
            padding: 12px;
            background: #FF7300;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .add-frame-btn:hover {
            background: #E66800;
        }

        .frame-item {
            background: #FFFFFF;
            border: 2px solid #E5E5EA;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .frame-item:hover {
            border-color: #FF7300;
        }

        .frame-item.active {
            border-color: #FF7300;
            background: #FFF3E8;
        }

        .frame-item > div {
            width: 100%;
            aspect-ratio: 1;
            background: #F5F5F7;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- HEADER - Bandeau en haut -->
        <div class="header">
            <div class="branding">
                <div class="logo-placeholder"></div>
                <div class="text-placeholder"></div>
            </div>
            <div class="header-actions">
                <div class="user-avatar"></div>
                <button class="play-btn">▶️</button>
            </div>
        </div>

        <!-- SIDEBAR GAUCHE - Outils -->
        <div class="sidebar-left">
            <h3>🎨 Outils</h3>
            
            <div class="color-palette">
                <div class="color-swatch" style="background: #000;"></div>
                <div class="color-swatch" style="background: #fff;"></div>
                <div class="color-swatch" style="background: #FF0000;"></div>
                <div class="color-swatch" style="background: #00FF00;"></div>
                <div class="color-swatch" style="background: #0000FF;"></div>
                <div class="color-swatch" style="background: #FFFF00;"></div>
                <div class="color-swatch" style="background: #FF00FF;"></div>
                <div class="color-swatch" style="background: #00FFFF;"></div>
            </div>

            <button class="btn">✏️ Gomme</button>
            <button class="btn">🎨 Pipette</button>
            <button class="btn">▶️ Animation</button>
            <button class="btn">⚙️ Vitesse</button>
            <button class="btn">🗑️ Effacer tout</button>
            <button class="btn">💾 Sauvegarder</button>
            <button class="btn">📂 Charger</button>
            <button class="btn btn-special">📷 Photo → Pixel</button>
            <button class="btn btn-success">🧩 Modèles</button>
        </div>

        <!-- CANVAS CENTRAL -->
        <div class="canvas-area">
            <div class="canvas-grid"></div>
        </div>

        <!-- SIDEBAR DROITE - Frames -->
        <div class="sidebar-right">
            <h3>🎬 Frames</h3>
            <button class="add-frame-btn">+ Nouvelle Frame</button>
            <div class="frame-item active">
                <div></div>
            </div>
            <div class="frame-item">
                <div></div>
            </div>
            <div class="frame-item">
                <div></div>
            </div>
        </div>
    </div>
</body>
</html>
