<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Community Gallery — Pixel Art Editor</title>
    <meta name="description" content="Explore pixel art created by the community. Get inspired, discover animated pixel art, and share your own creations with Pixel Editor.">

    <link rel="canonical" href="https://pixel-editor.app/gallery.html">

    <meta property="og:title" content="Community Gallery — Pixel Art Editor">
    <meta property="og:description" content="Explore pixel art created by the community. Get inspired and share your creations.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pixel-editor.app/gallery.html">
    <meta property="og:image" content="https://pixel-editor.app/assets/og-image.svg">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Community Gallery — Pixel Art Editor">
    <meta name="twitter:image" content="https://pixel-editor.app/assets/og-image.svg">

    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles/common.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #F5F5F7;
            color: #1D1D1F;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        /* Header */
        .gallery-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #E5E5EA;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .gallery-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .gallery-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .gallery-logo img.logo-icon { height: 36px; width: auto; }
        .gallery-logo img.logo-text { height: 22px; width: auto; }

        .btn-create {
            padding: 10px 20px;
            background: #FF7300;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .btn-create:hover {
            background: #E66800;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255,115,0,0.35);
        }

        /* Hero */
        .gallery-hero {
            text-align: center;
            padding: 48px 20px 32px;
        }

        .gallery-hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1D1D1F;
        }

        .gallery-hero p {
            color: #6E6E73;
            font-size: 1.05rem;
        }

        /* Controls */
        .gallery-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 20px 24px;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1.5px solid #E5E5EA;
            background: #FFFFFF;
            color: #6E6E73;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sort-btn.active {
            background: #FF7300;
            border-color: #FF7300;
            color: white;
        }

        .sort-btn:hover:not(.active) {
            background: #EBEBED;
            color: #1D1D1F;
            border-color: #D1D1D6;
        }

        /* Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            padding: 0 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Card */
        .gallery-card {
            background: #FFFFFF;
            border: 1px solid #E5E5EA;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .gallery-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.10);
            border-color: rgba(255,115,0,0.35);
        }

        .card-canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #F5F5F7;
        }

        .card-canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            display: block;
        }

        .card-animated-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 6px;
            padding: 3px 7px;
            font-size: 0.7rem;
            color: white;
            backdrop-filter: blur(4px);
        }

        .card-delete-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(220, 38, 38, 0.9);
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .gallery-card:hover .card-delete-btn {
            opacity: 1;
        }

        .card-body {
            padding: 12px;
        }

        .card-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 6px;
            color: #1D1D1F;
        }

        .card-stats {
            display: flex;
            gap: 12px;
            font-size: 0.78rem;
            color: #86868B;
        }

        /* States */
        .gallery-loading, .gallery-empty, .gallery-error {
            text-align: center;
            padding: 80px 20px;
            color: #6E6E73;
        }

        .state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #E5E5EA;
            border-top-color: #FF7300;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 0 12px 32px;
            }
            .gallery-hero h1 { font-size: 1.6rem; }
            .gallery-header { padding: 12px 16px; }
        }
    </style>
</head>
<body>

    <header class="gallery-header">
        <div class="gallery-header-left">
            <a href="/editor.html" style="text-decoration:none; display:flex; align-items:center; gap:8px; color:#6E6E73; font-size:0.9rem; transition:color 0.2s;" onmouseover="this.style.color='#1D1D1F'" onmouseout="this.style.color='#6E6E73'"
               data-en="← Back to editor" data-fr="← Retour à l'éditeur">← Back to editor
            </a>
        </div>
        <span class="gallery-logo">
            <img src="images/icon.png" alt="Pixel Editor Icon" class="logo-icon">
            <img src="images/text.png" alt="Pixel Editor" class="logo-text">
        </span>
        <div style="display:flex;align-items:center;gap:10px;">
            <div style="display:flex;gap:4px;background:#F5F5F7;border:1px solid #E5E5EA;border-radius:8px;padding:4px;">
                <button class="lang-btn-gallery active" data-lang="en" title="English" style="background:none;border:none;cursor:pointer;font-size:1rem;padding:3px 7px;border-radius:5px;opacity:0.5;transition:all 0.2s;">🇬🇧</button>
                <button class="lang-btn-gallery" data-lang="fr" title="Français" style="background:none;border:none;cursor:pointer;font-size:1rem;padding:3px 7px;border-radius:5px;opacity:0.5;transition:all 0.2s;">🇫🇷</button>
            </div>
            <a href="/editor.html" class="btn-create" data-en="✏️ Create pixel art" data-fr="✏️ Créer mon pixel art">✏️ Create pixel art</a>
        </div>
    </header>

    <section class="gallery-hero">
        <h1 data-en="🖼️ Gallery" data-fr="🖼️ Galerie">🖼️ Gallery</h1>
        <p data-en="Community creations" data-fr="Les créations de la communauté">Community creations</p>
    </section>

    <div class="gallery-controls">
        <button class="sort-btn active" data-sort="recent" data-en="🕐 Recent" data-fr="🕐 Récents">🕐 Recent</button>
        <button class="sort-btn" data-sort="popular" data-en="🔥 Popular" data-fr="🔥 Populaires">🔥 Popular</button>
    </div>

    <div id="galleryContainer">
        <div class="gallery-loading">
            <div class="spinner"></div>
            <p data-en="Loading creations..." data-fr="Chargement des créations...">Loading creations...</p>
        </div>
    </div>

    <script src="js/config/supabase-config.js"></script>
    <script src="js/config/app-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/database.js"></script>

    <script>
        // ── Language ──
        const lang = localStorage.getItem('lang') || 'en';

        function applyLang(l) {
            localStorage.setItem('lang', l);
            document.querySelectorAll('[data-en]').forEach(el => {
                const text = el.getAttribute('data-' + l);
                if (text) el.textContent = text;
            });
            document.querySelectorAll('.lang-btn-gallery').forEach(btn => {
                btn.style.opacity = btn.dataset.lang === l ? '1' : '0.5';
                btn.style.background = btn.dataset.lang === l ? '#EBEBED' : 'none';
            });
        }

        document.querySelectorAll('.lang-btn-gallery').forEach(btn => {
            btn.addEventListener('click', () => applyLang(btn.dataset.lang));
        });

        applyLang(lang);

        const T = {
            loading:  { en: 'Loading...', fr: 'Chargement...' },
            error:    { en: 'An error occurred.', fr: 'Une erreur est survenue.' },
            empty:    { en: 'No creations shared yet.', fr: 'Aucune création partagée pour le moment.' },
            beFirst:  { en: 'Be the first to share!', fr: 'Soyez le premier à partager !' },
        };
        const t = key => T[key][localStorage.getItem('lang') || 'en'];

        let currentSort = 'recent';
        const activeIntervals = [];

        function clearIntervals() {
            activeIntervals.forEach(clearInterval);
            activeIntervals.length = 0;
        }

        function drawFrame(ctx, frame, canvasSize) {
            if (!Array.isArray(frame) || frame.length === 0) return;
            const gridSize = Math.sqrt(frame.length);
            const pixelSize = canvasSize / gridSize;
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvasSize, canvasSize);
            frame.forEach((pixel, i) => {
                if (!pixel || pixel.isEmpty) return;
                ctx.fillStyle = pixel.color;
                ctx.fillRect((i % gridSize) * pixelSize, Math.floor(i / gridSize) * pixelSize, pixelSize, pixelSize);
            });
        }

        function fromSparseFrame(sparse) {
            const size = sparse.size || 1024;
            const frame = [];
            for (let i = 0; i < size; i++) frame.push({ color: '#FFFFFF', isEmpty: true });
            for (const entry of (sparse.data || [])) {
                if (entry.i >= 0 && entry.i < size) frame[entry.i] = { color: entry.c, isEmpty: false };
            }
            return frame;
        }

        function normalisePixel(p) {
            if (typeof p === 'string') return p ? { color: p, isEmpty: false } : { color: '#FFFFFF', isEmpty: true };
            return p || { color: '#FFFFFF', isEmpty: true };
        }

        function normaliseFrame(frame) {
            if (!frame) return null;
            if (frame._sparse === true) return fromSparseFrame(frame);
            if (Array.isArray(frame)) return frame.map(normalisePixel);
            if (Array.isArray(frame.pixels)) return frame.pixels.map(normalisePixel);
            return null;
        }

        function renderCard(share, currentUserId) {
            const snapshot = share.project_snapshot || {};
            const rawFrames = snapshot.frames || [];
            const frames = Array.isArray(rawFrames)
                ? rawFrames.map(normaliseFrame).filter(f => f !== null)
                : [];
            const fps = snapshot.fps || 4;
            const isAnimated = frames.length > 1;
            const frameCount = frames.length;

            const card = document.createElement('a');
            card.className = 'gallery-card';
            card.href = `/shared/${share.share_token}`;

            const isOwner = currentUserId && share.owner_id && share.owner_id === currentUserId;

            card.innerHTML = `
                <div class="card-canvas-wrapper">
                    <canvas class="card-canvas" width="128" height="128"></canvas>
                    ${isAnimated ? `<span class="card-animated-badge">▶ ${frameCount} frames</span>` : ''}
                    ${isOwner ? `<button class="card-delete-btn" title="Delete">🗑</button>` : ''}
                </div>
                <div class="card-body">
                    <div class="card-name">${escapeHtml(share.project_name)}</div>
                    <div class="card-stats">
                        <span>👁 ${share.view_count || 0}</span>
                        <span>📋 ${share.duplicate_count || 0}</span>
                    </div>
                </div>
            `;

            const canvas = card.querySelector('.card-canvas');
            const ctx = canvas.getContext('2d');
            let cardInterval = null;

            const startRender = () => {
                if (frames.length === 0 && share.project_thumbnail) {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0, 128, 128);
                    img.src = share.project_thumbnail;
                } else if (frames.length > 0) {
                    drawFrame(ctx, frames[0], 128);
                    if (isAnimated && !cardInterval) {
                        let idx = 0;
                        cardInterval = setInterval(() => {
                            idx = (idx + 1) % frames.length;
                            drawFrame(ctx, frames[idx], 128);
                        }, 1000 / fps);
                        activeIntervals.push(cardInterval);
                    }
                }
            };

            const stopRender = () => {
                if (cardInterval) {
                    clearInterval(cardInterval);
                    const i = activeIntervals.indexOf(cardInterval);
                    if (i !== -1) activeIntervals.splice(i, 1);
                    cardInterval = null;
                }
            };

            // Lazy render : dessiner uniquement quand visible
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) startRender();
                    else stopRender();
                });
            }, { rootMargin: '100px' });
            observer.observe(card);

            if (isOwner) {
                const deleteBtn = card.querySelector('.card-delete-btn');
                deleteBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const lang = localStorage.getItem('lang') || 'en';
                    const msg = lang === 'fr'
                        ? 'Supprimer cette création de la galerie ?'
                        : 'Remove this creation from the gallery?';
                    if (!confirm(msg)) return;
                    deleteBtn.textContent = '⏳';
                    deleteBtn.disabled = true;
                    const result = await window.dbService.deleteGalleryShare(share.id);
                    if (result.success) {
                        card.style.transition = 'opacity 0.3s, transform 0.3s';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.9)';
                        setTimeout(() => card.remove(), 300);
                    } else {
                        deleteBtn.textContent = '🗑';
                        deleteBtn.disabled = false;
                        alert(lang === 'fr' ? 'Erreur lors de la suppression.' : 'Error while deleting.');
                    }
                });
            }

            return card;
        }

        async function loadGallery(sort = 'recent') {
            clearIntervals();
            const container = document.getElementById('galleryContainer');
            container.innerHTML = `<div class="gallery-loading"><div class="spinner"></div><p>${t('loading')}</p></div>`;

            await window.authService.init();
            const currentUserId = window.dbService.getUserId ? window.dbService.getUserId() : null;

            const result = await window.dbService.getPublicGallery({ sortBy: sort });

            if (!result.success) {
                container.innerHTML = `<div class="gallery-error"><div class="state-icon">⚠️</div><p>${t('error')}</p></div>`;
                return;
            }

            if (result.data.length === 0) {
                container.innerHTML = `
                    <div class="gallery-empty">
                        <div class="state-icon">🎨</div>
                        <p>${t('empty')}</p>
                        <p style="margin-top:8px;">${t('beFirst')}</p>
                    </div>`;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'gallery-grid';
            result.data.forEach(share => grid.appendChild(renderCard(share, currentUserId)));
            container.innerHTML = '';
            container.appendChild(grid);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // Sort buttons
        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = btn.dataset.sort;
                loadGallery(currentSort);
            });
        });

        // Initial load
        loadGallery();
    </script>
</body>
</html>
