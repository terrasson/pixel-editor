<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Éditeur Pixel Art</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="editor-container">
        <div class="project-info">
            <button id="menuToggle" class="menu-hamburger">☰</button>
            <h2 id="projectTitle">Nouveau projet</h2>
        </div>
        
        <div class="toolbar">
            <div class="tools">
                <button id="clearBtn">Effacer tout</button>
                <button id="deleteFrameBtn">Supprimer la frame</button>
                <button id="previewBtn" title="Lancer/Arrêter l'animation">▶️</button>
                <button id="saveBtn">💾 Sauvegarder</button>
                <button id="loadBtn">📂 Charger</button>
                <button id="loadLocalBtn">🌐 Mes projets</button>
                <button id="copyFrameBtn">Copier la frame</button>
                <button id="pasteFrameBtn">Coller la frame</button>
                <button id="creditsBtn">Crédits</button>
            </div>
        </div>

        <div class="tools-secondary">
            <div class="color-palette">
                <input type="color" id="colorPicker" value="#000000">
                <button id="eraserBtn" class="eraser-btn">Gomme</button>
                <div class="preset-colors">
                    <button class="color-btn" style="background-color: #000000"></button>
                    <button class="color-btn" style="background-color: #FFFFFF"></button>
                    <button class="color-btn" style="background-color: #FF0000"></button>
                    <button class="color-btn" style="background-color: #00FF00"></button>
                    <button class="color-btn" style="background-color: #0000FF"></button>
                    <button class="color-btn" style="background-color: #FFFF00"></button>
                    <button class="color-btn" style="background-color: #FF00FF"></button>
                    <button class="color-btn" style="background-color: #00FFFF"></button>
                </div>
            </div>
        </div>

        <div class="grid-container">
            <div id="pixelGrid"></div>
        </div>

        <div class="frames-container">
            <button id="addFrameBtn">+ Nouvelle Frame</button>
            <div id="framesList"></div>
        </div>

        <!-- Espace réservé pour la publicité future -->
        <div class="ad-space"></div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
