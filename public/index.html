<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- App mobile settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Pixel Art">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Pixel Art">
    
    <!-- Theme colors -->
    <meta name="theme-color" content="#007AFF">
    <meta name="msapplication-TileColor" content="#007AFF">
    
    <title>Éditeur Pixel Art</title>
    
    <!-- Favicons et icônes -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
      <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
    
    <!-- Android/Chrome icons -->
    <link rel="icon" type="image/svg+xml" sizes="192x192" href="icon-192.svg">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Bibliothèque pour générer des GIF animés -->
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    
    <!-- Meta tags pour le support des fichiers -->
    <meta name="file-handlers" content="application/json:.pixelart,.json">
    
    <!-- Meta tags pour le partage social -->
    <meta property="og:title" content="Éditeur Pixel Art">
    <meta property="og:description" content="Créez des animations pixel art et partagez-les avec vos amis !">
    <meta property="og:type" content="website">
    <meta property="og:image" content="data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='1200' height='630' viewBox='0 0 1200 630'%3e%3crect width='1200' height='630' fill='%23007AFF'/%3e%3ctext x='600' y='350' font-family='Arial' font-size='80' font-weight='bold' text-anchor='middle' fill='white'%3eÉditeur Pixel Art 🎨%3c/text%3e%3c/svg%3e">
    
    <!-- Styles communs -->
    <link rel="stylesheet" href="styles/common.css">
    
    <!-- CSS conditionnel selon l'écran -->
    <link rel="stylesheet" href="styles/mobile.css" media="screen and (max-width: 1023px)">
    <link rel="stylesheet" href="styles/desktop.css" media="screen and (min-width: 1024px)">
</head>
<body>
    <div class="editor-container">
        <div class="project-info">
            <button id="menuToggle" class="menu-hamburger" title="Afficher les outils"></button>
            <h2 id="projectTitle">Nouveau projet</h2>
            <button id="playToggle" class="play-button" title="Lancer/Arrêter l'animation">▶️</button>
        </div>
        
        <div class="toolbar">
            <div class="tools">
                <button id="clearBtn">Effacer tout</button>
                <button id="deleteFrameBtn">Supprimer la frame</button>
                <button id="previewBtn" title="Lancer/Arrêter l'animation">▶️</button>
                <button id="saveBtn">💾 Sauvegarder</button>
                <button id="loadBtn">📂 Charger</button>
                <button id="loadLocalBtn">🌐 Mes projets</button>
                <button id="shareProjectBtn">📤 Partager</button>
                <button id="exportGifBtn">🎬 Export GIF</button>
                <button id="copyFrameBtn">Copier la frame</button>
                <button id="pasteFrameBtn">Coller la frame</button>
                <button id="helpBtn">❓ Aide</button>
                <button id="creditsBtn">Crédits</button>
            </div>
        </div>

        <!-- Interface compacte mobile intégrée -->
        <div class="tools-compact">
            <div class="compact-tools">
                <!-- Ligne principale : Gomme + Couleur actuelle + Couleurs + Undo/Redo -->
                <div class="compact-main-tools">
                    <!-- Gauche : Gomme + Couleur actuelle -->
                    <div class="compact-left-tools">
                        <button id="eraserBtn" class="compact-eraser-btn">Gomme</button>
                        <div class="compact-current-color-container">
                            <input type="color" id="colorPicker" value="#000000" class="compact-color-picker">
                            <div class="compact-current-color" id="currentColorDisplay"></div>
                        </div>
                    </div>
                    
                    <!-- Centre : Couleurs preset -->
                    <div class="compact-preset-colors">
                        <button class="compact-color-btn" style="background-color: #000000"></button>
                        <button class="compact-color-btn" style="background-color: #FFFFFF"></button>
                        <button class="compact-color-btn" style="background-color: #FF0000"></button>
                        <button class="compact-color-btn" style="background-color: #00FF00"></button>
                        <button class="compact-color-btn" style="background-color: #0000FF"></button>
                        <button class="compact-color-btn" style="background-color: #FFFF00"></button>
                        <button class="compact-color-btn" style="background-color: #FF00FF"></button>
                        <button class="compact-color-btn" style="background-color: #00FFFF"></button>
                    </div>
                    
                    <!-- Droite : Undo/Redo -->
                    <div class="compact-right-tools">
                        <button id="undoBtn" class="compact-undo-redo-btn" title="Annuler (←)">↶</button>
                        <button id="redoBtn" class="compact-undo-redo-btn" title="Rétablir (→)">↷</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal pour personnaliser la palette -->
        <div id="paletteModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Personnaliser la palette</h3>
                    <button id="closePaletteModal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="palette-customizer">
                        <div class="palette-colors-grid" id="paletteColorsGrid">
                            <!-- Les couleurs seront générées dynamiquement -->
                        </div>
                        <div class="palette-actions">
                            <button id="resetPaletteBtn" class="reset-btn">🔄 Couleurs par défaut</button>
                            <button id="savePaletteBtn" class="save-btn">💾 Sauvegarder</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tools-secondary">
            <div class="color-palette">
                <!-- Ligne 1 : Color picker + Validate -->
                <div class="color-picker-row">
                    <input type="color" id="colorPicker" value="#000000">
                    <button id="validateColorBtn" class="validate-color-btn">✓</button>
                </div>
                
                <!-- Ligne 2 : Undo + Couleurs + Redo -->
                <div class="tools-row">
                    <button id="undoBtn" class="undo-redo-btn" title="Annuler (←)">↶</button>
                    
                    <!-- Couleurs preset compactes -->
                    <div class="preset-colors">
                        <button class="color-btn" style="background-color: #000000"></button>
                        <button class="color-btn" style="background-color: #FFFFFF"></button>
                        <button class="color-btn" style="background-color: #FF0000"></button>
                        <button class="color-btn" style="background-color: #00FF00"></button>
                        <button class="color-btn" style="background-color: #0000FF"></button>
                        <button class="color-btn" style="background-color: #FFFF00"></button>
                        <button class="color-btn" style="background-color: #FF00FF"></button>
                        <button class="color-btn" style="background-color: #00FFFF"></button>
                    </div>
                    
                    <button id="redoBtn" class="undo-redo-btn" title="Rétablir (→)">↷</button>
                </div>
                
                <!-- Ligne 3 : Gomme -->
                <div class="tools-row">
                    <button id="eraserBtn" class="eraser-btn">Gomme</button>
                </div>
            </div>
            
            <!-- TOUS LES BOUTONS pour desktop -->
            <div class="extra-tools">
                <button id="previewBtn2" title="Lancer/Arrêter l'animation">▶️ Animation</button>
                <button id="clearBtn2">🗑️ Effacer tout</button>
                <button id="deleteFrameBtn2">🗑️ Supprimer la frame</button>
                <button id="saveBtn2">💾 Sauvegarder</button>
                <button id="loadBtn2">📂 Charger</button>
                <button id="loadLocalBtn2">🌐 Mes projets</button>
                <button id="shareProjectBtn2">📤 Partager</button>
                <button id="exportGifBtn2">🎬 Export GIF</button>
                <button id="copyFrameBtn2">📋 Copier la frame</button>
                <button id="pasteFrameBtn2">📋 Coller la frame</button>
                <button id="helpBtn2">❓ Aide</button>
                <button id="creditsBtn2">ℹ️ Crédits</button>
            </div>
        </div>

        <div class="grid-container">
            <div id="pixelGrid"></div>
        </div>

        <div class="frames-container">
            <button id="addFrameBtn">+ Nouvelle Frame</button>
            <div id="framesList"></div>
        </div>
    </div>

    <!-- Espace réservé pour la publicité future -->
    <div class="ad-space"></div>

    <script src="js/supabase-config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
