<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shared Pixel Art — Pixel Editor</title>
    <meta name="description" content="Check out this pixel art created with Pixel Editor — free online pixel art editor at pixel-editor.app">

    <meta id="og-title" property="og:title" content="Check out this pixel art!">
    <meta id="og-desc" property="og:description" content="A pixel art project created with Pixel Editor — free online pixel art editor at pixel-editor.app">
    <meta property="og:type" content="website">
    <meta id="og-image" property="og:image" content="https://pixel-editor.app/assets/og-image.svg">
    <meta property="og:site_name" content="Pixel Editor">

    <meta name="twitter:card" content="summary_large_image">
    <meta id="twitter-title" name="twitter:title" content="Check out this pixel art!">
    <meta id="twitter-image" name="twitter:image" content="https://pixel-editor.app/assets/og-image.svg">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles/common.css">

    <style>
        body {
            background: #F5F5F7;
            color: #1D1D1F;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .shared-container {
            max-width: 800px;
            width: 90%;
            padding: 40px 20px;
        }

        .shared-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .shared-header h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: #1D1D1F;
            font-weight: 700;
        }

        .shared-header p {
            color: #6E6E73;
            font-size: 1.1rem;
        }

        .project-card {
            background: #FFFFFF;
            border: 1px solid #E5E5EA;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        .project-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .project-thumbnail {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            background: #F5F5F7;
            image-rendering: pixelated;
            object-fit: cover;
            border: 1px solid #E5E5EA;
        }

        .project-details h2 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            color: #1D1D1F;
        }

        .project-meta {
            color: #6E6E73;
            font-size: 0.95rem;
        }

        .project-preview {
            margin: 30px 0;
            text-align: center;
        }

        #pixelCanvas {
            border-radius: 12px;
            background: #F5F5F7;
            image-rendering: pixelated;
            max-width: 100%;
            height: auto;
            border: 1px solid #E5E5EA;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 200px;
            padding: 15px 30px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: #FF7300;
            color: white;
        }

        .btn-primary:hover {
            background: #E66800;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(255, 115, 0, 0.35);
        }

        .btn-secondary {
            background: #F5F5F7;
            color: #1D1D1F;
            border: 1.5px solid #E5E5EA;
        }

        .btn-secondary:hover {
            background: #EBEBED;
            border-color: #D1D1D6;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #E5E5EA;
            border-top-color: #FF7300;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #E5E5EA;
        }

        .stat-item {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: #F5F5F7;
            border-radius: 10px;
            border: 1px solid #E5E5EA;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FF7300;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #6E6E73;
            margin-top: 5px;
        }

        .animation-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }

        .btn-play {
            background: #F5F5F7;
            border: 1.5px solid #E5E5EA;
            border-radius: 8px;
            color: #1D1D1F;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-play:hover {
            background: #EBEBED;
        }

        .frame-counter {
            font-size: 0.85rem;
            color: #86868B;
        }

        @media (max-width: 768px) {
            .shared-header h1 {
                font-size: 2rem;
            }

            .project-info {
                flex-direction: column;
                text-align: center;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                min-width: 100%;
            }

            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="shared-container">
        <div class="shared-header">
            <h1 data-en="🎨 Shared Pixel Art" data-fr="🎨 Projet Partagé">🎨 Shared Pixel Art</h1>
            <p data-en="A pixel art created with Pixel Editor" data-fr="Un pixel art créé avec l'Éditeur Pixel Art">A pixel art created with Pixel Editor</p>
        </div>

        <div id="content">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p data-en="Loading project..." data-fr="Chargement du projet...">Loading project...</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/database.js"></script>

    <script>
        // ── Language ──
        const T = {
            loading:       { en: 'Loading project...', fr: 'Chargement du projet...' },
            noToken:       { en: 'Invalid or incomplete share link.', fr: 'Le lien de partage est invalide ou incomplet.' },
            notFound:      { en: 'Project not found', fr: 'Projet introuvable' },
            error:         { en: 'An error occurred while loading.', fr: 'Une erreur est survenue lors du chargement.' },
            sharedOn:      { en: 'Shared on', fr: 'Partagé le' },
            duplicate:     { en: '📋 Duplicate to my account', fr: '📋 Dupliquer dans mon compte' },
            dupDisabled:   { en: '🔒 Duplication disabled', fr: '🔒 Duplication désactivée' },
            createAccount: { en: '👤 Create an account to duplicate', fr: '👤 Créer un compte pour dupliquer' },
            createArt:     { en: '🎨 Create my own pixel art', fr: '🎨 Créer mon propre pixel art' },
            views:         { en: 'Views', fr: 'Vues' },
            duplicates:    { en: 'Duplicates', fr: 'Duplications' },
            frames:        { en: 'Frames', fr: 'Frames' },
            duplicating:   { en: '⏳ Duplicating...', fr: '⏳ Duplication en cours...' },
            dupSuccess:    { en: 'Project duplicated! You can now edit it in your account.', fr: 'Projet dupliqué avec succès ! Vous pouvez maintenant le modifier dans votre compte.' },
            dupError:      { en: 'An error occurred', fr: 'Une erreur est survenue' },
            goToEditor:    { en: '🎨 Go to editor', fr: '🎨 Aller à l\'éditeur' },
            pause:         { en: '⏸ Pause', fr: '⏸ Pause' },
            play:          { en: '▶ Play', fr: '▶ Play' },
        };
        const t = key => T[key]?.[localStorage.getItem('lang') || 'en'] || T[key]?.en || key;

        // Apply lang to static elements
        (function applySharedLang() {
            const l = localStorage.getItem('lang') || 'en';
            document.documentElement.lang = l;
            document.querySelectorAll('[data-en]').forEach(el => {
                const text = el.getAttribute('data-' + l);
                if (text) el.textContent = text;
            });
        })();

        let currentShare = null;
        let currentUser = null;
        let animationInterval = null;
        let animationFrames = [];
        let animationFps = 24;
        let animationIndex = 0;
        let animationPlaying = false;

        // Initialize
        async function init() {
            try {
                // Get token from URL
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');

                if (!token) {
                    showError(t('notFound'), t('noToken'));
                    return;
                }

                // Initialize auth
                await window.authService.init();
                currentUser = window.authService.getCurrentUser();

                // Load shared project
                const result = await window.dbService.getPublicShare(token);

                if (!result.success) {
                    showError(t('notFound'), result.error);
                    return;
                }

                currentShare = result.data;

                // Log view
                await window.dbService.logPublicShareAnalytics(currentShare.id, 'viewed');

                // Display project
                displayProject(currentShare);

            } catch (error) {
                console.error('Init error:', error);
                showError('Error', t('error'));
            }
        }

        function displayProject(share) {
            const snapshot = share.project_snapshot;

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="project-card">
                    <div class="project-info">
                        ${share.project_thumbnail ? `
                            <img src="${share.project_thumbnail}" alt="${share.project_name}" class="project-thumbnail">
                        ` : ''}
                        <div class="project-details">
                            <h2>${escapeHtml(share.project_name)}</h2>
                            <div class="project-meta">
                                <div>📅 ${t('sharedOn')} ${new Date(share.created_at).toLocaleDateString(localStorage.getItem('lang') === 'fr' ? 'fr-FR' : 'en-US', {
                                    day: 'numeric',
                                    month: 'long',
                                    year: 'numeric'
                                })}</div>
                                <div>🎬 ${snapshot.fps || 24} FPS • ${snapshot.frames?.length || 1} frame(s)</div>
                            </div>
                        </div>
                    </div>

                    <div class="project-preview">
                        <canvas id="pixelCanvas" width="320" height="320"></canvas>
                        <div class="animation-controls" id="animationControls" style="display:none;">
                            <button class="btn-play" id="playPauseBtn" onclick="toggleAnimation()">⏸ Pause</button>
                            <span class="frame-counter" id="frameCounter">1 / 1</span>
                        </div>
                    </div>

                    <div class="action-buttons">
                        ${currentUser ? `
                            ${share.allow_duplicate ? `
                                <button class="btn btn-primary" onclick="duplicateProject()">${t('duplicate')}</button>
                            ` : `
                                <button class="btn btn-secondary" disabled>${t('dupDisabled')}</button>
                            `}
                        ` : `
                            <button class="btn btn-primary" onclick="goToLogin()">${t('createAccount')}</button>
                        `}
                        <button class="btn btn-secondary" onclick="goToApp()">${t('createArt')}</button>
                    </div>

                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-value">${share.view_count || 0}</div>
                            <div class="stat-label">${t('views')}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${share.duplicate_count || 0}</div>
                            <div class="stat-label">${t('duplicates')}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${snapshot.frames?.length || 1}</div>
                            <div class="stat-label">${t('frames')}</div>
                        </div>
                    </div>
                </div>
            `;

            // Render first frame on canvas
            renderFrame(snapshot);

            // Update meta tags for sharing
            updateMetaTags(share);
        }

        function drawFrameOnCanvas(frame) {
            const canvas = document.getElementById('pixelCanvas');
            if (!canvas || !frame) return;

            const ctx = canvas.getContext('2d');
            const gridSize = Math.sqrt(frame.length);
            const pixelSize = canvas.width / gridSize;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            frame.forEach((pixel, index) => {
                if (!pixel || pixel.isEmpty) return;
                const x = (index % gridSize) * pixelSize;
                const y = Math.floor(index / gridSize) * pixelSize;
                ctx.fillStyle = pixel.color || '#FFFFFF';
                ctx.fillRect(x, y, pixelSize, pixelSize);
            });
        }

        function updateFrameCounter() {
            const counter = document.getElementById('frameCounter');
            if (counter) counter.textContent = `${animationIndex + 1} / ${animationFrames.length}`;
        }

        function startAnimation() {
            if (animationInterval) clearInterval(animationInterval);
            animationPlaying = true;
            document.getElementById('playPauseBtn').textContent = t('pause');
            animationInterval = setInterval(() => {
                animationIndex = (animationIndex + 1) % animationFrames.length;
                try {
                    drawFrameOnCanvas(animationFrames[animationIndex]);
                } catch(e) {
                    console.error('Frame draw error:', e);
                }
                updateFrameCounter();
            }, 1000 / animationFps);
        }

        function stopAnimation() {
            if (animationInterval) clearInterval(animationInterval);
            animationInterval = null;
            animationPlaying = false;
            document.getElementById('playPauseBtn').textContent = t('play');
        }

        function toggleAnimation() {
            if (animationPlaying) stopAnimation();
            else startAnimation();
        }

        function fromSparseFrame(sparse) {
            const size = sparse.size || 1024;
            const frame = [];
            for (let i = 0; i < size; i++) frame.push({ color: '#FFFFFF', isEmpty: true });
            for (const entry of (sparse.data || [])) {
                if (entry.i >= 0 && entry.i < size) frame[entry.i] = { color: entry.c, isEmpty: false };
            }
            return frame;
        }

        function normalisePixel(p) {
            if (typeof p === 'string') return p ? { color: p, isEmpty: false } : { color: '#FFFFFF', isEmpty: true };
            return p || { color: '#FFFFFF', isEmpty: true };
        }

        function normaliseFrame(frame) {
            if (!frame) return null;
            if (frame._sparse === true) return fromSparseFrame(frame);
            if (Array.isArray(frame)) return frame.map(normalisePixel);
            if (Array.isArray(frame.pixels)) return frame.pixels.map(normalisePixel);
            return null;
        }

        function renderFrame(snapshot) {
            const rawFrames = snapshot.frames || [];
            animationFrames = Array.isArray(rawFrames)
                ? rawFrames.map(normaliseFrame).filter(f => f !== null)
                : [];
            animationFps = snapshot.fps || 24;
            animationIndex = snapshot.current_frame || 0;

            if (animationFrames.length === 0) return;

            // Draw initial frame
            try {
                drawFrameOnCanvas(animationFrames[animationIndex]);
            } catch(e) {
                console.error('Draw error:', e);
            }

            // Show controls and start animation only if multi-frame
            if (animationFrames.length > 1) {
                const controls = document.getElementById('animationControls');
                if (controls) controls.style.display = 'flex';
                updateFrameCounter();
                startAnimation();
            }
        }

        function updateMetaTags(share) {
            // Update page title
            document.title = `${share.project_name} - Shared Pixel Art`;

            // Update OG tags
            document.querySelector('meta[property="og:title"]').content = `${share.project_name} - Pixel Art`;
            if (share.project_thumbnail) {
                document.getElementById('og-image').content = share.project_thumbnail;
            }
        }

        async function duplicateProject() {
            const btn = event.currentTarget;
            const originalText = btn.textContent;
            btn.textContent = t('duplicating');
            btn.disabled = true;

            try {
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');

                const result = await window.dbService.duplicatePublicShare(token);

                if (result.success) {
                    alert(`✅ "${result.data.name}" — ${t('dupSuccess')}`);
                    window.location.href = '/editor.html';
                } else {
                    alert(`❌ ${result.error}`);
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Duplicate error:', error);
                alert(`❌ ${t('dupError')}`);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        function goToLogin() {
            window.location.href = '/login.html';
        }

        function goToApp() {
            window.location.href = '/editor.html';
        }

        function showError(title, message) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="error-state">
                    <div class="error-icon">⚠️</div>
                    <h2>${title}</h2>
                    <p style="color: rgba(255, 255, 255, 0.7); margin: 20px 0;">${message}</p>
                    <button class="btn btn-primary" onclick="goToApp()" style="margin: 0 auto; display: inline-block;">
                        ${t('goToEditor')}
                    </button>
                </div>
            `;
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Cleanup on unload
        window.addEventListener('beforeunload', () => {
            if (animationInterval) clearInterval(animationInterval);
        });

        // Start
        init();
    </script>
</body>
</html>
