<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Sign in to Pixel Editor to save your pixel art projects to the cloud and access them from any device.">
    <link rel="canonical" href="https://pixel-editor.app/login.html">
    <title>Pixel Art Editor — Sign in</title>

    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png">

    <link rel="stylesheet" href="styles/login.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">

            <!-- Logo/Header -->
            <div class="login-header">
                <h1>🎨 Pixel Art Editor</h1>
                <p class="tagline" data-en="Create and share your pixel art animations" data-fr="Créez et partagez vos animations pixel art">Create and share your pixel art animations</p>
            </div>

            <!-- Lang switcher -->
            <div style="display:flex;justify-content:center;gap:6px;margin-bottom:16px;">
                <button class="lang-btn-login" data-lang="en" style="background:none;border:1px solid rgba(255,255,255,0.2);border-radius:6px;cursor:pointer;font-size:0.9rem;padding:4px 10px;color:white;transition:all 0.2s;">🇬🇧 EN</button>
                <button class="lang-btn-login" data-lang="fr" style="background:none;border:1px solid rgba(255,255,255,0.2);border-radius:6px;cursor:pointer;font-size:0.9rem;padding:4px 10px;color:white;transition:all 0.2s;">🇫🇷 FR</button>
            </div>

            <!-- Notification Area -->
            <div id="notification" class="notification hidden"></div>

            <!-- Login/Signup Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="signin" data-en="Sign in" data-fr="Connexion">Sign in</button>
                <button class="tab-btn" data-tab="signup" data-en="Sign up" data-fr="Inscription">Sign up</button>
            </div>

            <!-- Sign In Form -->
            <form id="signinForm" class="auth-form active">
                <div class="form-group">
                    <label for="signin-email">Email</label>
                    <input type="email" id="signin-email" placeholder="your@email.com" data-placeholder-en="your@email.com" data-placeholder-fr="votre@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="signin-password" data-en="Password" data-fr="Mot de passe">Password</label>
                    <input type="password" id="signin-password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">
                    <span class="btn-text" data-en="Sign in" data-fr="Se connecter">Sign in</span>
                    <span class="btn-loading hidden" data-en="Signing in..." data-fr="Connexion...">Signing in...</span>
                </button>
                <div class="form-footer">
                    <a href="#" id="forgot-password-link" class="link" data-en="Forgot password?" data-fr="Mot de passe oublié ?">Forgot password?</a>
                </div>
            </form>

            <!-- Sign Up Form -->
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" placeholder="your@email.com" data-placeholder-en="your@email.com" data-placeholder-fr="votre@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="signup-password" data-en="Password" data-fr="Mot de passe">Password</label>
                    <input type="password" id="signup-password" placeholder="••••••••" required autocomplete="new-password" minlength="6">
                    <small class="form-hint" data-en="Minimum 6 characters" data-fr="Minimum 6 caractères">Minimum 6 characters</small>
                </div>
                <div class="form-group">
                    <label for="signup-password-confirm" data-en="Confirm password" data-fr="Confirmer le mot de passe">Confirm password</label>
                    <input type="password" id="signup-password-confirm" placeholder="••••••••" required autocomplete="new-password" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary">
                    <span class="btn-text" data-en="Create account" data-fr="Créer un compte">Create account</span>
                    <span class="btn-loading hidden" data-en="Creating..." data-fr="Création...">Creating...</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span data-en="or" data-fr="ou">or</span>
            </div>

            <!-- OAuth -->
            <div class="oauth-buttons">
                <button id="google-signin" class="btn btn-oauth btn-google">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                        <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
                        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
                    </svg>
                    <span data-en="Continue with Google" data-fr="Continuer avec Google">Continue with Google</span>
                </button>
            </div>

            <!-- Password Reset Modal -->
            <div id="reset-password-modal" class="modal hidden">
                <div class="modal-content">
                    <h3 data-en="Reset password" data-fr="Réinitialiser le mot de passe">Reset password</h3>
                    <p data-en="Enter your email to receive a reset link." data-fr="Entrez votre email pour recevoir un lien de réinitialisation.">Enter your email to receive a reset link.</p>
                    <form id="reset-password-form">
                        <div class="form-group">
                            <input type="email" id="reset-email" placeholder="your@email.com" data-placeholder-en="your@email.com" data-placeholder-fr="votre@email.com" required>
                        </div>
                        <div class="modal-buttons">
                            <button type="button" class="btn btn-secondary" id="cancel-reset" data-en="Cancel" data-fr="Annuler">Cancel</button>
                            <button type="submit" class="btn btn-primary" data-en="Send" data-fr="Envoyer">Send</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="login-footer">
            <p data-en="By signing in, you agree to our terms of use." data-fr="En vous connectant, vous acceptez nos conditions d'utilisation.">By signing in, you agree to our terms of use.</p>
        </div>
    </div>

    <script src="js/config/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // ── Language ──
        const T = {
            signedIn:        { en: 'Signed in! Redirecting...', fr: 'Connexion réussie ! Redirection...' },
            signInError:     { en: 'Sign in error.', fr: 'Erreur de connexion.' },
            passwordMismatch:{ en: 'Passwords do not match.', fr: 'Les mots de passe ne correspondent pas.' },
            accountCreated:  { en: 'Account created! Check your email to confirm.', fr: 'Compte créé ! Vérifiez votre email pour confirmer.' },
            accountError:    { en: 'Error creating account.', fr: 'Erreur lors de la création du compte.' },
            googleError:     { en: 'Google sign in error.', fr: 'Erreur de connexion Google.' },
            resetSent:       { en: 'Reset email sent!', fr: 'Email de réinitialisation envoyé !' },
            resetError:      { en: 'Error sending reset email.', fr: 'Erreur lors de l\'envoi.' },
        };
        const t = key => T[key][localStorage.getItem('lang') || 'en'];

        function applyLoginLang(l) {
            localStorage.setItem('lang', l);
            document.documentElement.lang = l;
            document.querySelectorAll('[data-en]').forEach(el => {
                const text = el.getAttribute('data-' + l);
                if (text) el.textContent = text;
            });
            document.querySelectorAll('[data-placeholder-en]').forEach(el => {
                el.placeholder = el.getAttribute('data-placeholder-' + l);
            });
            document.querySelectorAll('.lang-btn-login').forEach(btn => {
                btn.style.background = btn.dataset.lang === l ? 'rgba(255,255,255,0.15)' : 'none';
            });
        }

        document.querySelectorAll('.lang-btn-login').forEach(btn => {
            btn.addEventListener('click', () => applyLoginLang(btn.dataset.lang));
        });

        applyLoginLang(localStorage.getItem('lang') || 'en');

        // ── Tab switching ──
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
                document.getElementById(`${tab}Form`).classList.add('active');
            });
        });

        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.classList.remove('hidden');
            setTimeout(() => notification.classList.add('hidden'), 5000);
        }

        // ── Sign In ──
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.btn-primary');
            const btnText = btn.querySelector('.btn-text');
            const btnLoading = btn.querySelector('.btn-loading');
            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            const result = await window.authService.signIn(
                document.getElementById('signin-email').value,
                document.getElementById('signin-password').value
            );

            if (result.success) {
                showNotification(t('signedIn'), 'success');
                setTimeout(() => { window.location.href = '/editor.html'; }, 1000);
            } else {
                showNotification(result.error || t('signInError'), 'error');
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });

        // ── Sign Up ──
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.btn-primary');
            const btnText = btn.querySelector('.btn-text');
            const btnLoading = btn.querySelector('.btn-loading');

            const password = document.getElementById('signup-password').value;
            const passwordConfirm = document.getElementById('signup-password-confirm').value;

            if (password !== passwordConfirm) {
                showNotification(t('passwordMismatch'), 'error');
                return;
            }

            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            const result = await window.authService.signUp(
                document.getElementById('signup-email').value,
                password
            );

            if (result.success) {
                showNotification(t('accountCreated'), 'success');
                setTimeout(() => { document.querySelector('[data-tab="signin"]').click(); }, 2000);
            } else {
                showNotification(result.error || t('accountError'), 'error');
            }

            btn.disabled = false;
            btnText.classList.remove('hidden');
            btnLoading.classList.add('hidden');
        });

        // ── Google ──
        document.getElementById('google-signin').addEventListener('click', async () => {
            const result = await window.authService.signInWithGoogle();
            if (!result.success) showNotification(result.error || t('googleError'), 'error');
        });

        // ── Forgot password ──
        document.getElementById('forgot-password-link').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('reset-password-modal').classList.remove('hidden');
        });

        document.getElementById('cancel-reset').addEventListener('click', () => {
            document.getElementById('reset-password-modal').classList.add('hidden');
        });

        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const result = await window.authService.resetPassword(document.getElementById('reset-email').value);
            if (result.success) {
                showNotification(t('resetSent'), 'success');
                document.getElementById('reset-password-modal').classList.add('hidden');
            } else {
                showNotification(result.error || t('resetError'), 'error');
            }
        });

        // ── Auth check ──
        document.addEventListener('DOMContentLoaded', async () => {
            const initialized = await window.authService.init();
            if (!initialized) {
                showNotification('⚠️ Supabase not configured. Please check the console.', 'error');
                return;
            }
            if (window.authService.isAuthenticated()) {
                window.location.href = '/editor.html';
            }
        });
    </script>
</body>
</html>
