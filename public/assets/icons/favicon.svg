<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange Pixel Editor logo on white background -->
  <rect width="512" height="512" fill="#ffffff"/>
  <!-- Outer rounded square frame -->
  <rect x="64" y="64" width="320" height="320" rx="32" ry="32"
        fill="none" stroke="#FF7300" stroke-width="20"/>
  <!-- Pixel dots top-right (cascading) -->
  <rect x="340" y="72"  width="32" height="32" rx="4" fill="none" stroke="#FF7300" stroke-width="14"/>
  <rect x="356" y="116" width="28" height="28" rx="4" fill="none" stroke="#FF7300" stroke-width="12"/>
  <rect x="372" y="156" width="24" height="24" rx="3" fill="none" stroke="#FF7300" stroke-width="10"/>
  <!-- Swirl / eye shape inside -->
  <path d="M 168 280 Q 128 200 200 160 Q 280 120 300 200 Q 320 280 240 300 Q 180 316 168 280 Z"
        fill="none" stroke="#FF7300" stroke-width="18" stroke-linecap="round"/>
  <!-- Inner C-curve -->
  <path d="M 200 220 Q 220 180 260 200 Q 290 220 272 256"
        fill="none" stroke="#FF7300" stroke-width="14" stroke-linecap="round"/>
</svg>
