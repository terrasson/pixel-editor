<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond sombre avec grille -->
  <rect width="512" height="512" fill="#0a0a0a"/>
  
  <!-- Grille bleue -->
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1a4a7a" stroke-width="1" opacity="0.3"/>
    </pattern>
    
    <!-- Filtre néon -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Filtre néon intense -->
    <filter id="neonIntense" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Grille de fond -->
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Cadre néon rose -->
  <rect x="80" y="80" width="352" height="352" rx="20" ry="20" 
        fill="none" stroke="#ff1493" stroke-width="8" 
        filter="url(#neonIntense)" opacity="0.9"/>
  
  <!-- Crayon central -->
  <!-- Gomme (magenta) -->
  <rect x="248" y="140" width="16" height="20" fill="#ff1493" filter="url(#neonGlow)"/>
  <!-- Bande métallique (orange) -->
  <rect x="244" y="160" width="24" height="8" fill="#ff8c00" filter="url(#neonGlow)"/>
  <!-- Corps du crayon -->
  <!-- Bande jaune gauche -->
  <rect x="244" y="168" width="4" height="120" fill="#ffff00" filter="url(#neonGlow)"/>
  <!-- Bandes vertes centrales -->
  <rect x="248" y="168" width="4" height="120" fill="#00ff00" filter="url(#neonGlow)"/>
  <rect x="252" y="168" width="4" height="120" fill="#00ff00" filter="url(#neonGlow)"/>
  <rect x="256" y="168" width="4" height="120" fill="#00ff00" filter="url(#neonGlow)"/>
  <!-- Bande jaune droite -->
  <rect x="260" y="168" width="4" height="120" fill="#ffff00" filter="url(#neonGlow)"/>
  <!-- Pointe du crayon (orange) -->
  <polygon points="244,288 264,288 256,320" fill="#ff8c00" filter="url(#neonGlow)"/>
  <!-- Mine (magenta) -->
  <polygon points="256,320 252,340 260,340" fill="#ff1493" filter="url(#neonGlow)"/>
  
  <!-- Éléments pixel art autour du crayon -->
  <!-- Plus jaune en haut à gauche -->
  <rect x="180" y="180" width="8" height="8" fill="#ffff00" filter="url(#neonGlow)"/>
  <rect x="184" y="176" width="8" height="8" fill="#ffff00" filter="url(#neonGlow)"/>
  <rect x="184" y="184" width="8" height="8" fill="#ffff00" filter="url(#neonGlow)"/>
  <rect x="184" y="188" width="8" height="8" fill="#ffff00" filter="url(#neonGlow)"/>
  
  <!-- Cœur vert en haut à droite -->
  <rect x="324" y="180" width="8" height="8" fill="#00ff00" filter="url(#neonGlow)"/>
  <rect x="332" y="180" width="8" height="8" fill="#00ff00" filter="url(#neonGlow)"/>
  <rect x="320" y="188" width="8" height="8" fill="#00ff00" filter="url(#neonGlow)"/>
  <rect x="328" y="188" width="8" height="8" fill="#00ff00" filter="url(#neonGlow)"/>
  <rect x="336" y="188" width="8" height="8" fill="#00ff00" filter="url(#neonGlow)"/>
  <rect x="344" y="188" width="8" height="8" fill="#00ff00" filter="url(#neonGlow)"/>
  <rect x="324" y="196" width="8" height="8" fill="#00ff00" filter="url(#neonGlow)"/>
  <rect x="332" y="196" width="8" height="8" fill="#00ff00" filter="url(#neonGlow)"/>
  <rect x="340" y="196" width="8" height="8" fill="#00ff00" filter="url(#neonGlow)"/>
  <rect x="332" y="204" width="8" height="8" fill="#00ff00" filter="url(#neonGlow)"/>
  
  <!-- Étoile bleue milieu gauche -->
  <rect x="160" y="240" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  <rect x="168" y="240" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  <rect x="176" y="240" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  <rect x="168" y="232" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  <rect x="168" y="248" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  
  <!-- Étoile bleue milieu droite -->
  <rect x="328" y="240" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  <rect x="336" y="240" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  <rect x="344" y="240" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  <rect x="336" y="232" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  <rect x="336" y="248" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  
  <!-- Losange bleu bas gauche -->
  <rect x="180" y="320" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  <rect x="188" y="312" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  <rect x="196" y="320" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  <rect x="188" y="328" width="8" height="8" fill="#00bfff" filter="url(#neonGlow)"/>
  
  <!-- Plus magenta bas droite -->
  <rect x="324" y="320" width="8" height="8" fill="#ff1493" filter="url(#neonGlow)"/>
  <rect x="332" y="316" width="8" height="8" fill="#ff1493" filter="url(#neonGlow)"/>
  <rect x="332" y="324" width="8" height="8" fill="#ff1493" filter="url(#neonGlow)"/>
  <rect x="332" y="328" width="8" height="8" fill="#ff1493" filter="url(#neonGlow)"/>
  
  <!-- Texte "PIXEL ART" en bas -->
  <text x="256" y="400" text-anchor="middle" 
        font-family="monospace" font-size="24" font-weight="bold" 
        fill="#00bfff" filter="url(#neonGlow)">
    PIXEL ART
  </text>
</svg>
