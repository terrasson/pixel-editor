<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#5856D6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Pixel art grid decoration (top-right) -->
  <g opacity="0.08">
    <rect x="800" y="0" width="400" height="630" fill="none"/>
    <!-- Grid lines -->
    <line x1="820" y1="0" x2="820" y2="630" stroke="white" stroke-width="1"/>
    <line x1="860" y1="0" x2="860" y2="630" stroke="white" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="white" stroke-width="1"/>
    <line x1="940" y1="0" x2="940" y2="630" stroke="white" stroke-width="1"/>
    <line x1="980" y1="0" x2="980" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1060" y1="0" x2="1060" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1180" y1="0" x2="1180" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="40" x2="1200" y2="40" stroke="white" stroke-width="1"/>
    <line x1="800" y1="80" x2="1200" y2="80" stroke="white" stroke-width="1"/>
    <line x1="800" y1="120" x2="1200" y2="120" stroke="white" stroke-width="1"/>
    <line x1="800" y1="160" x2="1200" y2="160" stroke="white" stroke-width="1"/>
    <line x1="800" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="800" y1="240" x2="1200" y2="240" stroke="white" stroke-width="1"/>
    <line x1="800" y1="280" x2="1200" y2="280" stroke="white" stroke-width="1"/>
    <line x1="800" y1="320" x2="1200" y2="320" stroke="white" stroke-width="1"/>
    <line x1="800" y1="360" x2="1200" y2="360" stroke="white" stroke-width="1"/>
    <line x1="800" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="800" y1="440" x2="1200" y2="440" stroke="white" stroke-width="1"/>
    <line x1="800" y1="480" x2="1200" y2="480" stroke="white" stroke-width="1"/>
    <line x1="800" y1="520" x2="1200" y2="520" stroke="white" stroke-width="1"/>
    <line x1="800" y1="560" x2="1200" y2="560" stroke="white" stroke-width="1"/>
    <line x1="800" y1="600" x2="1200" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Pixel art smiley (decorative, top right) -->
  <g transform="translate(900, 80)" opacity="0.7">
    <!-- body pixels (each pixel = 30px) -->
    <rect x="60" y="0" width="30" height="30" fill="#f59e0b"/>
    <rect x="90" y="0" width="30" height="30" fill="#f59e0b"/>
    <rect x="120" y="0" width="30" height="30" fill="#f59e0b"/>
    <rect x="30" y="30" width="30" height="30" fill="#f59e0b"/>
    <rect x="60" y="30" width="30" height="30" fill="#fbbf24"/>
    <rect x="90" y="30" width="30" height="30" fill="#fbbf24"/>
    <rect x="120" y="30" width="30" height="30" fill="#fbbf24"/>
    <rect x="150" y="30" width="30" height="30" fill="#f59e0b"/>
    <rect x="30" y="60" width="30" height="30" fill="#f59e0b"/>
    <rect x="60" y="60" width="30" height="30" fill="#1e293b"/>
    <rect x="90" y="60" width="30" height="30" fill="#fbbf24"/>
    <rect x="120" y="60" width="30" height="30" fill="#1e293b"/>
    <rect x="150" y="60" width="30" height="30" fill="#f59e0b"/>
    <rect x="30" y="90" width="30" height="30" fill="#f59e0b"/>
    <rect x="60" y="90" width="30" height="30" fill="#ef4444"/>
    <rect x="90" y="90" width="30" height="30" fill="#ef4444"/>
    <rect x="120" y="90" width="30" height="30" fill="#ef4444"/>
    <rect x="150" y="90" width="30" height="30" fill="#f59e0b"/>
    <rect x="30" y="120" width="30" height="30" fill="#f59e0b"/>
    <rect x="60" y="120" width="30" height="30" fill="#fbbf24"/>
    <rect x="90" y="120" width="30" height="30" fill="#fbbf24"/>
    <rect x="120" y="120" width="30" height="30" fill="#fbbf24"/>
    <rect x="150" y="120" width="30" height="30" fill="#f59e0b"/>
    <rect x="60" y="150" width="30" height="30" fill="#f59e0b"/>
    <rect x="90" y="150" width="30" height="30" fill="#f59e0b"/>
    <rect x="120" y="150" width="30" height="30" fill="#f59e0b"/>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="200" width="6" height="80" fill="url(#accent)" rx="3"/>

  <!-- Main text -->
  <text x="110" y="262" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">Pixel Editor</text>

  <!-- Tagline -->
  <text x="112" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" fill="rgba(255,255,255,0.6)" letter-spacing="0">Free online pixel art editor — draw, animate &amp; share</text>

  <!-- Badge pills -->
  <rect x="112" y="360" width="130" height="40" rx="20" fill="rgba(0,122,255,0.2)" stroke="rgba(0,122,255,0.4)" stroke-width="1"/>
  <text x="177" y="385" font-family="-apple-system, sans-serif" font-size="18" fill="#60a5fa" text-anchor="middle">Free</text>

  <rect x="256" y="360" width="200" height="40" rx="20" fill="rgba(0,122,255,0.2)" stroke="rgba(0,122,255,0.4)" stroke-width="1"/>
  <text x="356" y="385" font-family="-apple-system, sans-serif" font-size="18" fill="#60a5fa" text-anchor="middle">No download</text>

  <rect x="470" y="360" width="230" height="40" rx="20" fill="rgba(0,122,255,0.2)" stroke="rgba(0,122,255,0.4)" stroke-width="1"/>
  <text x="585" y="385" font-family="-apple-system, sans-serif" font-size="18" fill="#60a5fa" text-anchor="middle">Works on mobile</text>

  <!-- URL -->
  <text x="112" y="540" font-family="-apple-system, sans-serif" font-size="22" fill="rgba(255,255,255,0.35)">pixel-editor.app</text>
</svg>
